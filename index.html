<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nutrición Mayela"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>Nutrición Mayela — Julio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --card: #1e1e35;
  --sage: #7ecb8f;
  --sage-dim: #3a6b45;
  --terra: #e8855a;
  --terra-dim: #7a3d22;
  --gold: #f0c060;
  --gold-dim: #6b5020;
  --lavender: #a78bfa;
  --lav-dim: #4c3a7a;
  --text: #f0ede8;
  --text2: #a09880;
  --text3: #60574e;
  --line: #2a2a45;
  --radius: 16px;
  --tab-h: 70px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow: hidden;
  user-select: none;
}

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100%; }

/* ── HEADER ── */
.header {
  background: var(--surface);
  padding: 52px 20px 16px;
  display: flex; align-items: flex-end; justify-content: space-between;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; line-height: 1; }
.header-title em { color: var(--terra); font-style: italic; }
.header-sub { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin-top: 3px; }
.header-badge {
  background: var(--sage-dim); color: var(--sage);
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 5px 10px; border-radius: 20px;
}

/* ── SCROLLABLE CONTENT ── */
.content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 10px);
}
.content::-webkit-scrollbar { display: none; }

/* ── TABS ── */
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid var(--line);
  display: flex; z-index: 100;
  padding-bottom: var(--safe-bottom);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
  color: var(--text3); cursor: pointer; transition: color 0.2s;
  padding: 8px 0 0;
}
.tab.active { color: var(--terra); }
.tab-icon { font-size: 22px; line-height: 1; }

/* ── WEEK SELECTOR ── */
.week-selector {
  display: flex; gap: 8px; padding: 16px 16px 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.week-selector::-webkit-scrollbar { display: none; }
.week-btn {
  flex-shrink: 0; background: var(--surface2);
  border: 1.5px solid transparent; border-radius: 10px;
  padding: 8px 16px; font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all 0.2s;
}
.week-btn.active {
  background: var(--terra-dim); border-color: var(--terra);
  color: var(--terra);
}

/* ── DAY STRIP ── */
.day-strip {
  display: flex; gap: 8px; padding: 14px 16px 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.day-strip::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; background: var(--surface2);
  border: 1.5px solid transparent; border-radius: 12px;
  padding: 8px 12px; cursor: pointer; transition: all 0.2s; min-width: 50px;
}
.day-pill.active {
  background: var(--terra-dim); border-color: var(--terra);
}
.day-pill.libre { background: var(--lav-dim); border-color: transparent; }
.day-pill.libre.active { border-color: var(--lavender); }
.day-dow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); }
.day-num { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; line-height: 1.1; color: var(--text); margin-top: 2px; }
.day-pill.active .day-dow, .day-pill.active .day-num { color: var(--terra); }
.day-pill.libre .day-dow { color: var(--lavender); opacity: 0.7; }
.day-pill.libre .day-num { color: var(--lavender); }

/* ── DAY DETAIL ── */
.day-detail { padding: 14px 16px; }

.day-title-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px;
}
.day-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic; color: var(--text); }
.libre-badge {
  background: var(--lav-dim); color: var(--lavender);
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 4px 10px; border-radius: 20px;
}

.meal-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px;
  border-left: 3px solid transparent;
  animation: fadeUp 0.3s ease both;
}
.meal-card:nth-child(1) { animation-delay: 0.05s; }
.meal-card:nth-child(2) { animation-delay: 0.1s; }
.meal-card:nth-child(3) { animation-delay: 0.15s; }
.meal-card:nth-child(4) { animation-delay: 0.2s; }
.meal-card:nth-child(5) { animation-delay: 0.25s; }

.meal-card.desayuno { border-color: var(--gold); }
.meal-card.mmañana  { border-color: var(--sage); }
.meal-card.comida   { border-color: var(--terra); }
.meal-card.merienda { border-color: var(--gold); }
.meal-card.cena     { border-color: var(--lavender); }
.meal-card.libre-card { border-color: var(--lavender); background: var(--lav-dim); opacity: 0.85; }

.meal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.meal-icon { font-size: 18px; }
.meal-label-txt {
  font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text2);
}
.meal-content { font-size: 14px; line-height: 1.6; color: var(--text); }
.meal-content.libre-text { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: var(--lavender); }

.tip-bar {
  background: var(--surface2); border-radius: 10px;
  padding: 10px 14px; margin-top: 4px; margin-bottom: 8px;
  font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px;
  animation: fadeUp 0.3s 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SHOPPING ── */
.shop-view { padding: 16px; }
.shop-week-label {
  font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic;
  color: var(--text); margin-bottom: 14px; padding: 0 2px;
}
.shop-cat-card {
  background: var(--card); border-radius: var(--radius);
  margin-bottom: 12px; overflow: hidden;
}
.shop-cat-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  cursor: pointer;
}
.shop-cat-head h3 { font-size: 13px; font-weight: 600; flex: 1; }
.shop-cat-chevron { font-size: 12px; color: var(--text2); transition: transform 0.2s; }
.shop-cat-card.open .shop-cat-chevron { transform: rotate(90deg); }
.shop-items { padding: 8px 16px 12px; display: none; }
.shop-cat-card.open .shop-items { display: block; }
.shop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: opacity 0.2s;
}
.shop-item:last-child { border-bottom: none; }
.shop-item.checked { opacity: 0.4; }
.shop-check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--text3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.2s;
}
.shop-item.checked .shop-check { background: var(--sage); border-color: var(--sage); }
.shop-item-text { flex: 1; font-size: 13px; line-height: 1.4; }
.shop-item-qty { font-size: 12px; font-weight: 600; color: var(--terra); white-space: nowrap; }
.shop-reset {
  background: var(--surface2); border: none; border-radius: 10px;
  padding: 10px 16px; width: 100%; color: var(--text2);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  cursor: pointer; margin-top: 8px;
}

/* ── TIPS VIEW ── */
.tips-view { padding: 16px; }
.tip-section { margin-bottom: 20px; }
.tip-section h3 {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic;
  margin-bottom: 10px; color: var(--terra);
}
.tip-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px; font-size: 13px;
  line-height: 1.7; color: var(--text2);
  border-left: 3px solid var(--sage);
}
.tip-card strong { color: var(--text); font-weight: 600; }

/* ── MENÚ (opciones base) ── */
.menu-view { padding: 16px; }
.menu-intro {
  font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic;
  color: var(--text2); margin-bottom: 16px; line-height: 1.5; padding: 0 2px;
}
.menu-block { margin-bottom: 14px; }
.menu-block-head { display: flex; align-items: center; gap: 8px; margin: 0 2px 8px; }
.menu-block-icon { font-size: 20px; }
.menu-block-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text2);
}
.menu-card {
  background: var(--card); border-radius: var(--radius);
  padding: 6px 16px; border-left: 3px solid var(--line);
}
.menu-card.desayuno { border-color: var(--gold); }
.menu-card.mmañana  { border-color: var(--sage); }
.menu-card.comida   { border-color: var(--terra); }
.menu-card.merienda { border-color: var(--gold); }
.menu-card.cena     { border-color: var(--lavender); }
.menu-opt {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 11px 0; border-bottom: 1px solid var(--line);
}
.menu-opt:last-child { border-bottom: none; }
.menu-opt-tag {
  flex-shrink: 0; font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text2);
  background: var(--surface2); border-radius: 6px;
  padding: 4px 7px; min-width: 34px; text-align: center; line-height: 1.3;
}
.menu-opt.dulce  .menu-opt-tag { color: var(--gold); background: var(--gold-dim); }
.menu-opt.salado .menu-opt-tag { color: var(--sage); background: var(--sage-dim); }
.menu-opt-text { flex: 1; font-size: 14px; line-height: 1.55; color: var(--text); }
.menu-opt-text b { font-weight: 600; color: var(--text); }
.menu-single {
  font-size: 14px; line-height: 1.55; color: var(--text); padding: 11px 0;
}
.menu-note {
  background: var(--surface2); border-radius: 10px;
  padding: 11px 14px; margin-bottom: 8px;
  font-size: 13px; line-height: 1.55; color: var(--text2);
  display: flex; gap: 9px; align-items: flex-start;
}
.menu-note b { color: var(--text); font-weight: 600; }
.menu-note-icon { font-size: 16px; flex-shrink: 0; }
</style>
</head>

// ── STATE ──
let currentView = 'menu';
let currentWeek = 0;
let currentDay = 0;
let checkedItems = JSON.parse(localStorage.getItem('checkedItems') || '{}');
let openCats = {};

// ── HELPERS ──
function isLibre(dayIdx) {
  const m = MEALS_TEMPLATE[dayIdx % 7];
  return m.comida.includes('LIBRE') || m.cena.includes('LIBRE');
}

function saveChecked() {
  try { localStorage.setItem('checkedItems', JSON.stringify(checkedItems)); } catch(e) {}
}

// ── RENDER ──
function render() {
  const c = document.getElementById('content');
  if (currentView === 'menu') c.innerHTML = renderMenu();
  else if (currentView === 'plan') c.innerHTML = renderPlan();
  else if (currentView === 'shop') c.innerHTML = renderShop();
  else c.innerHTML = renderTips();
  attachEvents();
}

function renderPlan() {
  const week = WEEKS[currentWeek];
  let html = '';

  // week selector
  html += '<div class="week-selector">';
  WEEKS.forEach((w, wi) => {
    html += `<div class="week-btn ${wi===currentWeek?'active':''}" onclick="selectWeek(${wi})">${w.label}</div>`;
  });
  html += '</div>';

  // day strip
  html += '<div class="day-strip">';
  week.dates.forEach((d, di) => {
    const dayOfWeek = (d + 1) % 7; // July 1 2026 = Wednesday
    const libre = isLibre(dayOfWeek);
    html += `<div class="day-pill ${di===currentDay?'active':''} ${libre?'libre':''}" onclick="selectDay(${di})">
      <div class="day-dow">${DAYS[dayOfWeek]}</div>
      <div class="day-num">${d}</div>
    </div>`;
  });
  html += '</div>';

  // day detail
  const date = week.dates[currentDay];
  const dayOfWeek = (date + 1) % 7;
  const m = MEALS_TEMPLATE[dayOfWeek];
  const libre = isLibre(dayOfWeek);

  html += `<div class="day-detail">
    <div class="day-title-row">
      <div class="day-title">${DAYS[dayOfWeek]}, ${date} de julio</div>
      ${libre ? '<div class="libre-badge">✨ Día libre</div>' : ''}
    </div>`;

  const meals = [
    { key:'desayuno', icon:'☀️', label:'Desayuno', cls:'desayuno' },
    { key:'mmañana', icon:'🍃', label:'Media mañana', cls:'mmañana' },
    { key:'comida', icon:'🥗', label:'Comida', cls:'comida' },
    { key:'merienda', icon:'🌤', label:'Merienda', cls:'merienda' },
    { key:'cena', icon:'🌙', label:'Cena', cls:'cena' }
  ];

  meals.forEach(meal => {
    const txt = m[meal.key];
    const isLibreMeal = txt.includes('LIBRE');
    html += `<div class="meal-card ${meal.cls} ${isLibreMeal?'libre-card':''}">
      <div class="meal-header">
        <span class="meal-icon">${meal.icon}</span>
        <span class="meal-label-txt">${meal.label}</span>
      </div>
      <div class="meal-content ${isLibreMeal?'libre-text':''}">${txt}</div>
    </div>`;
  });

  html += `<div class="tip-bar">💧 Si te entra hambre entre horas → una infusión (cola de caballo o té verde). Postre en la comida: manzana o pera 🍎</div>`;
  html += '</div>';

  return html;
}

function renderShop() {
  let html = `<div class="shop-view">
    <div class="shop-week-label">${WEEKS[currentWeek].label} · Lista semanal</div>`;

  html += '<div class="week-selector" style="padding:0 0 14px;">';
  WEEKS.forEach((w, si) => {
    html += `<div class="week-btn ${si===currentWeek?'active':''}" onclick="selectWeek(${si})">${w.label}</div>`;
  });
  html += '</div>';

  html += `<div class="tip-bar" style="margin:0 0 12px;">🛒 ${SHOPPING.note}</div>`;

  SHOPPING.categories.forEach((cat, ci) => {
    const catKey = `${currentWeek}-${ci}`;
    const isOpen = openCats[catKey] !== false; // default open
    html += `<div class="shop-cat-card ${isOpen?'open':''}" id="cat-${ci}">
      <div class="shop-cat-head" onclick="toggleCat(${ci})" style="background:${cat.color}22">
        <span style="font-size:18px">${cat.icon}</span>
        <h3>${cat.name}</h3>
        <span class="shop-cat-chevron">›</span>
      </div>
      <div class="shop-items">`;

    cat.items.forEach((item, ii) => {
      const itemKey = `${currentWeek}-${ci}-${ii}`;
      const checked = !!checkedItems[itemKey];
      html += `<div class="shop-item ${checked?'checked':''}" onclick="toggleItem(${ci},${ii})">
        <div class="shop-check">${checked?'✓':''}</div>
        <div class="shop-item-text">${item.name}</div>
        <div class="shop-item-qty">${item.qty}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `<button class="shop-reset" onclick="resetWeek()">🔄 Desmarcar todos esta semana</button>`;
  html += '</div>';
  return html;
}

function renderMenu() {
  let html = `<div class="menu-view">
    <div class="menu-intro">${MENU.intro}</div>`;

  MENU.blocks.forEach(block => {
    html += `<div class="menu-block">
      <div class="menu-block-head">
        <span class="menu-block-icon">${block.icon}</span>
        <span class="menu-block-title">${block.title}</span>
      </div>
      <div class="menu-card ${block.cls}">`;

    if (block.single) {
      html += `<div class="menu-single">${block.single}</div>`;
    } else {
      block.options.forEach(opt => {
        html += `<div class="menu-opt ${opt.kind || ''}">
          <span class="menu-opt-tag">${opt.tag}</span>
          <span class="menu-opt-text">${opt.text}</span>
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  html += `<div class="menu-block">
    <div class="menu-block-head">
      <span class="menu-block-icon">📌</span>
      <span class="menu-block-title">Notas del plan</span>
    </div>`;
  MENU.notes.forEach(note => {
    html += `<div class="menu-note">
      <span class="menu-note-icon">${note.icon}</span>
      <span>${note.text}</span>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}

function renderTips() {
  return `<div class="tips-view">
    <div class="tip-section">
      <h3>Desayunos</h3>
      <div class="tip-card"><strong>Salado:</strong> tortitas de maíz o pan de centeno con pechuga de pavo y ½ aguacate, o tostada de centeno con Philadelphia light y pepino. Siempre con tu café.</div>
      <div class="tip-card"><strong>Dulce:</strong> yogur batido con frutos rojos congelados, o tostada de centeno con mermelada de tomate o frambuesa. Antioxidantes desde primera hora.</div>
    </div>
    <div class="tip-section">
      <h3>Media mañana</h3>
      <div class="tip-card">🍌 <strong>Un plátano</strong> + <strong>infusión de cola de caballo</strong>. Energía y un empujón depurativo entre el desayuno y la comida.</div>
    </div>
    <div class="tip-section">
      <h3>Comidas</h3>
      <div class="tip-card"><strong>🐟 Pescado:</strong> merluza, lenguado, emperador o mero, bacalao. Acompaña con boniato, patata, guisantes y zanahoria, col, espinacas, pimientos o cebolla.</div>
      <div class="tip-card"><strong>🥗 Ensaladas:</strong> de lentejas (con feta y atún o sardinas) o de brotes (con pollo, o con atún/anchoas). Sazona con especias o mostaza y ½ cucharada de miel.</div>
      <div class="tip-card"><strong>🍝 1-2 días por semana:</strong> pasta sin gluten o de lentejas con carne picada de pollo y tomate natural.</div>
    </div>
    <div class="tip-section">
      <h3>Merienda</h3>
      <div class="tip-card"><strong>Dulce:</strong> yogur griego con arándanos y ½ cucharada de miel. <strong>Salado:</strong> tortitas de maíz con pechuga de pavo. Siempre con <strong>infusión de té verde</strong>.</div>
    </div>
    <div class="tip-section">
      <h3>Cenas</h3>
      <div class="tip-card">Ligeras y con proteína: tortilla de atún, ternera o solomillo a la plancha, muslos de pollo o chuletas de pavo con patata/boniato, o crema de verduras de primero.</div>
    </div>
    <div class="tip-section">
      <h3>Postre y extras</h3>
      <div class="tip-card">🍎 <strong>Postre en cada comida:</strong> una manzana o una pera.</div>
      <div class="tip-card">🐚 <strong>Si te notas floja o débil:</strong> añade a la comida una lata de mejillones. Hierro y minerales.</div>
      <div class="tip-card">🍫 <strong>Antojo de dulce:</strong> tostada de pan de centeno con mantequilla de cacahuete o mermelada al gusto.</div>
    </div>
  </div>`;
}

// ── EVENTS ──
function attachEvents() {}

function selectWeek(wi) {
  currentWeek = wi;
  currentDay = 0;
  render();
  document.getElementById('content').scrollTop = 0;
}

function selectDay(di) {
  currentDay = di;
  render();
}

function toggleCat(ci) {
  const catKey = `${currentWeek}-${ci}`;
  openCats[catKey] = !(openCats[catKey] !== false);
  render();
}

function toggleItem(ci, ii) {
  const itemKey = `${currentWeek}-${ci}-${ii}`;
  checkedItems[itemKey] = !checkedItems[itemKey];
  saveChecked();
  render();
}

function resetWeek() {
  Object.keys(checkedItems).forEach(k => {
    if (k.startsWith(`${currentWeek}-`)) delete checkedItems[k];
  });
  saveChecked();
  render();
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${view}`).classList.add('active');
  render();
  document.getElementById('content').scrollTop = 0;
}

// ── INIT ──
// Set current day based on today's date if in June 2026
(function initCurrentDay() {
  const today = new Date();
  if (today.getFullYear() === 2026 && today.getMonth() === 6) {
    const d = today.getDate();
    for (let wi = 0; wi < WEEKS.length; wi++) {
      const idx = WEEKS[wi].dates.indexOf(d);
      if (idx !== -1) { currentWeek = wi; currentDay = idx; break; }
    }
  }
})();

render();
</script>
